<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Minecraft Bedrock TitleRaw Concept Editor</title>

<style>

body{
    background:#202124;
    color:white;
    font-family:Segoe UI;
    margin:40px;
}

.versionContainer{
    position:fixed;
    top:10px;
    right:10px;
    background:#2a2a2a;
    border:1px solid #444;
    padding:8px 12px;
    border-radius:4px;
    font-size:12px;
    color:#aaa;
    font-family:Consolas;
}

h1{
    margin-bottom:25px;
}

.section{
    margin-bottom:30px;
}

textarea{

    width:100%;
    min-height:80px;
    resize:none;

    padding:12px;
    font-size:15px;

    border:2px solid #444;
    border-radius:6px;

    background:#111;
    color:white;

    box-sizing:border-box;
}

textarea:focus{
    outline:none;
    border-color:#3aa0ff;
}

.buttonRow{

    margin-top:10px;
}

button{

    padding:8px 18px;
    margin-right:8px;

    background:#3a3a3a;
    color:white;

    border:none;
    border-radius:5px;

    cursor:pointer;
}

button:hover{

    background:#555;
}

.error{

    margin-top:8px;

    background:#430000;
    color:#ff8f8f;

    padding:10px;

    border-radius:5px;

    min-height:20px;
    font-family:Consolas;
    font-size:13px;
    white-space:pre-wrap;
    word-wrap:break-word;
}

.previewContainer{

    display:flex;
    align-items:flex-start;
    gap:15px;
}

.preview{

    flex:1;

    background:#111;
    border:3px solid #888;

    padding:18px;

    font-family:Consolas;
    font-size:18px;

    min-height:70px;
}

.refresh{

    height:45px;
}

.success{
    color:#5cff83;
}

</style>

</head>
<body>

<div class="versionContainer">
    v<span id="version">1.4</span>
</div>

<h1>Bedrock TitleRaw Editor (Concept)</h1>

<div class="section">

<h2>Variables / Scoreboards</h2>

<textarea
id="commandBox"
placeholder="/scoreboard...
or
/variable create string class Warrior"></textarea>

<div class="buttonRow">
<button onclick="executeCommand()">Execute</button>
<button onclick="clearCommand()">Clear</button>
</div>

<div id="commandError" class="error"></div>

</div>



<div class="section">

<h2>TitleRaw</h2>

<textarea
id="titleBox"
placeholder='/titleraw @s actionbar {"rawtext":[{"text":"Hello"}]}'></textarea>

<div class="buttonRow">
<button onclick="executeTitle()">Execute</button>
<button onclick="clearTitle()">Clear</button>
</div>

<div id="titleError" class="error"></div>

</div>



<div class="section">

<h2>Preview</h2>

<div class="previewContainer">

<div id="preview" class="preview">
(No title displayed)
</div>

<button class="refresh" onclick="refreshPreview()">
Refresh
</button>

</div>

</div>



<script>

const VERSION = "1.4";
let variables={};
let scoreboards={};
let commandValid = false;
let titleValid = false;

function autoGrow(box){

    box.style.height="5px";
    box.style.height=box.scrollHeight+"px";

}

// Initialize on page load
window.addEventListener("DOMContentLoaded", () => {
    document.getElementById("version").innerText = VERSION;
    loadFromLocalStorage();
    
    document.querySelectorAll("textarea").forEach(t=>{
        autoGrow(t);
        t.addEventListener("input",()=>{
            autoGrow(t);
            saveToLocalStorage();
        });
    });
});

// Save to localStorage
function saveToLocalStorage(){
    localStorage.setItem("commandBox", document.getElementById("commandBox").value);
    localStorage.setItem("titleBox", document.getElementById("titleBox").value);
    localStorage.setItem("variables", JSON.stringify(variables));
    localStorage.setItem("scoreboards", JSON.stringify(scoreboards));
    localStorage.setItem("commandValid", commandValid);
    localStorage.setItem("titleValid", titleValid);
    localStorage.setItem("commandError", document.getElementById("commandError").innerHTML);
    localStorage.setItem("titleError", document.getElementById("titleError").innerHTML);
}

// Load from localStorage
function loadFromLocalStorage(){
    let savedCommand = localStorage.getItem("commandBox");
    let savedTitle = localStorage.getItem("titleBox");
    let savedVariables = localStorage.getItem("variables");
    let savedScoreboards = localStorage.getItem("scoreboards");
    let savedCommandValid = localStorage.getItem("commandValid");
    let savedTitleValid = localStorage.getItem("titleValid");
    let savedCommandError = localStorage.getItem("commandError");
    let savedTitleError = localStorage.getItem("titleError");
    
    if(savedCommand) document.getElementById("commandBox").value = savedCommand;
    if(savedTitle) document.getElementById("titleBox").value = savedTitle;
    if(savedVariables) variables = JSON.parse(savedVariables);
    if(savedScoreboards) scoreboards = JSON.parse(savedScoreboards);
    if(savedCommandValid) commandValid = savedCommandValid === "true";
    if(savedTitleValid) titleValid = savedTitleValid === "true";
    if(savedCommandError) document.getElementById("commandError").innerHTML = savedCommandError;
    if(savedTitleError) document.getElementById("titleError").innerHTML = savedTitleError;
}

function clearCommand(){

    document.getElementById("commandBox").value="";
    document.getElementById("commandError").innerHTML="";
    variables={};
    scoreboards={};
    commandValid = false;
    saveToLocalStorage();

}

function clearTitle(){

    document.getElementById("titleBox").value="";
    document.getElementById("titleError").innerHTML="";
    titleValid = false;
    saveToLocalStorage();

}

// Parse quoted strings
function parseQuotedString(input){
    if(input.startsWith('"') && input.endsWith('"')){
        return input.slice(1, -1);
    }
    return input;
}

function executeCommand(){

    let input=document.getElementById("commandBox").value.trim();

    let error=document.getElementById("commandError");

    error.innerHTML="";
    commandValid = false;

    if(input.startsWith("/variable")){

        validateVariable(input,error);
        return;

    }

    if(input.startsWith("/scoreboard")){

        validateScoreboard(input,error);
        return;

    }

    error.innerHTML="Unknown command. Expected /variable or /scoreboard";

}

function validateVariable(command,error){

    let split=command.split(/\s+/);

    if(split.length<4){

        error.innerHTML="/variable [create/set/remove] [type/selector] [name] [value]\n\nIncomplete command: missing arguments";
        return;

    }

    let mode=split[1];
    let typeOrSelector=split[2];

    if(!["create","set","remove"].includes(mode)){

        error.innerHTML="/variable [create/set/remove] [type/selector] [name] [value]\n\nInvalid mode '" + mode + "': expected create, set, or remove";
        return;

    }

    // CREATE mode
    if(mode === "create"){

        if(split.length<4){
            error.innerHTML="/variable create [number/string/boolean/null] [name] [value]\n\nIncomplete command: missing type and/or name";
            return;
        }

        let type = typeOrSelector;
        let varName = split[3];

        if(!["number","string","boolean","null"].includes(type)){
            error.innerHTML="/variable create [number/string/boolean/null] [name] [value]\n\nInvalid type '" + type + "': expected number, string, boolean, or null";
            return;
        }

        if(type === "null"){
            if(!variables[varName]){
                variables[varName] = {};
            }
            variables[varName].base = null;
            error.innerHTML='<span class="success">Variable created.</span>';
            commandValid = true;
            saveToLocalStorage();
            return;
        }

        if(split.length<5){
            error.innerHTML="/variable create [" + type + "] [name] [value]\n\nMissing value for variable";
            return;
        }

        let valueStr = split.slice(4).join(" ");
        let value;

        if(type === "string"){
            value = parseQuotedString(valueStr);
        }
        else if(type === "number"){
            if(isNaN(valueStr)){
                error.innerHTML="/variable create [number] [name] [value]\n\nInvalid number: '" + valueStr + "' is not a valid number";
                return;
            }
            value = parseInt(valueStr);
        }
        else if(type === "boolean"){
            let loweredValue = valueStr.toLowerCase();
            if(!["true","false"].includes(loweredValue)){
                error.innerHTML="/variable create [boolean] [name] [value]\n\nInvalid boolean: '" + valueStr + "' is not true or false";
                return;
            }
            value = loweredValue === "true";
        }

        if(!variables[varName]){
            variables[varName] = {};
        }
        variables[varName].base = value;
        error.innerHTML='<span class="success">Variable created.</span>';
        commandValid = true;
        saveToLocalStorage();
        return;

    }

    // SET mode
    if(mode === "set"){

        if(split.length<5){
            error.innerHTML="/variable set [selector] [name] [value]\n\nIncomplete command: expected selector, name, and value";
            return;
        }

        let selector = typeOrSelector;
        let varName = split[3];
        let valueStr = split.slice(4).join(" ");

        if(!variables[varName]){
            error.innerHTML="/variable set [selector] [name] [value]\n\nVariable '" + varName + "' does not exist. Create it first with /variable create";
            return;
        }

        let baseValue = variables[varName].base;
        let type;

        if(baseValue === null){
            type = "null";
        }
        else if(typeof baseValue === "number"){
            type = "number";
        }
        else if(typeof baseValue === "string"){
            type = "string";
        }
        else if(typeof baseValue === "boolean"){
            type = "boolean";
        }

        let value;

        if(type === "null"){
            error.innerHTML="/variable set [selector] [name] [value]\n\nCannot set a null variable";
            return;
        }
        else if(type === "string"){
            value = parseQuotedString(valueStr);
        }
        else if(type === "number"){
            if(isNaN(valueStr)){
                error.innerHTML="/variable set [selector] [name] [value]\n\nInvalid number: '" + valueStr + "' is not a valid number";
                return;
            }
            value = parseInt(valueStr);
        }
        else if(type === "boolean"){
            let loweredValue = valueStr.toLowerCase();
            if(!["true","false"].includes(loweredValue)){
                error.innerHTML="/variable set [selector] [name] [value]\n\nInvalid boolean: '" + valueStr + "' is not true or false";
                return;
            }
            value = loweredValue === "true";
        }

        if(!variables[varName][selector]){
            variables[varName][selector] = {};
        }
        variables[varName][selector] = value;
        error.innerHTML='<span class="success">Variable set for ' + selector + '.</span>';
        commandValid = true;
        saveToLocalStorage();
        return;

    }

    // REMOVE mode
    if(mode === "remove"){

        if(split.length<4){
            error.innerHTML="/variable remove [selector] [name]\n\nIncomplete command: expected selector and name";
            return;
        }

        let selector = typeOrSelector;
        let varName = split[3];

        if(!variables[varName]){
            error.innerHTML="/variable remove [selector] [name]\n\nVariable '" + varName + "' does not exist";
            return;
        }

        if(!variables[varName][selector]){
            error.innerHTML="/variable remove [selector] [name]\n\n" + selector + " does not have a specific value for '" + varName + "'";
            return;
        }

        delete variables[varName][selector];
        error.innerHTML='<span class="success">Variable removed for ' + selector + '.</span>';
        commandValid = true;
        saveToLocalStorage();
        return;

    }

}

function validateScoreboard(command,error){

    let split=command.split(/\s+/);

    if(split.length < 3){

        error.innerHTML="/scoreboard [objectives/players] [action] ...\n\nIncomplete command";
        return;
    }

    let subcommand = split[1]; // objectives or players

    if(subcommand === "objectives"){

        if(split.length < 4){
            error.innerHTML="/scoreboard objectives [add/remove] [name]\n\nIncomplete command: missing objective name";
            return;
        }

        let action = split[2]; // add, remove, etc.
        let objectiveName = split[3];

        if(!["add","remove"].includes(action)){
            error.innerHTML="/scoreboard objectives [add/remove] [name]\n\nInvalid action '" + action + "': expected add or remove";
            return;
        }

        if(action === "add"){
            scoreboards[objectiveName] = {};
            error.innerHTML='<span class="success">Objective created.</span>';
        }
        else if(action === "remove"){
            delete scoreboards[objectiveName];
            error.innerHTML='<span class="success">Objective removed.</span>';
        }

    }
    else if(subcommand === "players"){

        if(split.length < 6){
            error.innerHTML="/scoreboard players [add/set/remove] [player] [objective] [value]\n\nIncomplete command: expected 5 arguments";
            return;
        }

        let action = split[2]; // add, set, remove
        let player = split[3];
        let objectiveName = split[4];
        let value = split[5];

        if(!["set","add","remove"].includes(action)){
            error.innerHTML="/scoreboard players [add/set/remove] [player] [objective] [value]\n\nInvalid action '" + action + "': expected add, set, or remove";
            return;
        }

        if(!scoreboards[objectiveName]){
            error.innerHTML="/scoreboard players [add/set/remove] [player] [objective] [value]\n\nObjective '" + objectiveName + "' does not exist. Create it first with /scoreboard objectives add " + objectiveName;
            return;
        }

        if(isNaN(value)){
            error.innerHTML="/scoreboard players [add/set/remove] [player] [objective] [value]\n\nInvalid value: '" + value + "' is not a valid number";
            return;
        }

        if(action === "set"){
            scoreboards[objectiveName][player] = parseInt(value);
            error.innerHTML='<span class="success">Score set: ' + objectiveName + ' ' + player + ' = ' + value + '</span>';
        }
        else if(action === "add"){
            if(!scoreboards[objectiveName][player]){
                scoreboards[objectiveName][player] = 0;
            }
            scoreboards[objectiveName][player] += parseInt(value);
            error.innerHTML='<span class="success">Score added: ' + objectiveName + ' ' + player + ' += ' + value + '</span>';
        }
        else if(action === "remove"){
            delete scoreboards[objectiveName][player];
            error.innerHTML='<span class="success">Score removed: ' + objectiveName + ' ' + player + '</span>';
        }

    }
    else{
        error.innerHTML="/scoreboard [objectives/players] ...\n\nInvalid subcommand '" + subcommand + "': expected objectives or players";
        return;
    }

    commandValid = true;
    saveToLocalStorage();

}

function executeTitle(){

    let error=document.getElementById("titleError");

    error.innerHTML="";
    titleValid = false;

    let command=document.getElementById("titleBox").value.trim();

    if(!command.startsWith("/titleraw ")){

        error.innerHTML="/titleraw [selector] [mode] {JSON}\n\nCommand must begin with /titleraw";
        return;
    }

    let firstBrace=command.indexOf("{");

    if(firstBrace==-1){

        error.innerHTML="/titleraw [selector] [mode] {JSON}\n\nMissing JSON object";
        return;
    }

    let json=command.substring(firstBrace);

    try{

        JSON.parse(json);

        error.innerHTML='<span class="success">Command valid.</span>';
        titleValid = true;
        saveToLocalStorage();

    }

    catch(e){

        error.innerHTML="/titleraw [selector] [mode] {JSON}\n\nInvalid JSON: " + e.message;
    }

}

function getVariableValue(varName, selector){
    if(!variables[varName]){
        return undefined;
    }

    // Check for player-specific value first
    if(variables[varName][selector] !== undefined){
        return variables[varName][selector];
    }

    // Fall back to base value
    if(variables[varName].base !== undefined){
        return variables[varName].base;
    }

    return undefined;
}

function refreshPreview(){

    // Use the validity flags instead of checking error text
    if(!commandValid){
        document.getElementById("preview").innerText="(Error in command)";
        return;
    }

    if(!titleValid){
        document.getElementById("preview").innerText="(Invalid JSON)";
        return;
    }

    let cmd=document.getElementById("titleBox").value.trim();

    if(!cmd){
        document.getElementById("preview").innerText="(No title displayed)";
        return;
    }

    let firstBrace=cmd.indexOf("{");

    if(firstBrace===-1){
        document.getElementById("preview").innerText="";
        return;
    }

    let jsonString=cmd.substring(firstBrace);

    try{

        let json=JSON.parse(jsonString);

        if(!json.rawtext || !Array.isArray(json.rawtext)){
            document.getElementById("preview").innerText="(Invalid: missing rawtext array)";
            return;
        }

        let output="";

        json.rawtext.forEach(entry=>{

            if(entry.text){
                output+=entry.text;
            }

            if(entry.variable){

                let varName = entry.variable.var;
                let value = getVariableValue(varName, "@s");

                if(value===undefined){
                    output+="<Undefined>";
                }
                else{
                    output+=value;
                }

            }

            if(entry.score){

                let objectiveName = entry.score.objective;
                let playerName = entry.score.name;

                if(!scoreboards[objectiveName] || scoreboards[objectiveName][playerName] === undefined){
                    output+="<Undefined>";
                }
                else{
                    output+=scoreboards[objectiveName][playerName];
                }

            }

        });

        document.getElementById("preview").innerText=output;

    }

    catch(e){

        document.getElementById("preview").innerText="(Error parsing JSON: " + e.message + ")";
    }

}

</script>

</body>
</html>
